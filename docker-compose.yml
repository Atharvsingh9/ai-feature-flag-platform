version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: feature_flags_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: feature_flags

    ports:
       - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: feature_flags_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data: